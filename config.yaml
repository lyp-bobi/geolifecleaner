# GeoLife & T-Drive Trajectory Cleaner

# ── 1. Dataset ──────────────────────────────────────────────────────────────
datasets:
  enabled:
    - geolife
    # - tdrive

input:
  geolife:
    path: "data/Geolife Trajectories 1.3"
    include_labels: true
    user_ids: null          # null = all; example: ["001", "005"]
    bbox: null              # [min_lon, min_lat, max_lon, max_lat]
    date_range: null        # ["2008-01-01", "2012-12-31"]
  tdrive:
    path: "data/T-drive Taxi Trajectories"
    user_ids: null
    bbox: null
    date_range: null

# ── 2. Processing ────────────────────────────────────────────────────────────
processing:
  drop_invalid_coords: true
  remove_duplicates: true

  # 2.1 Remove points whose straight-line distance to the previous point
  #     exceeds max_distance_m (catches GPS teleportation jumps)
  outlier_edge:
    enabled: false
    max_distance_m: 5000

  # 2.2 Remove points where the speed to the previous point exceeds
  #     threshold_ms (m/s).  300 km/h ≈ 83.3 m/s
  max_speed:
    enabled: false
    threshold_ms: 83.3

  # 2.3 Local neighbourhood deviation filter (ported from original prototype):
  #     for each point, build a window of up to ±window_points neighbours
  #     that are within window_seconds seconds; remove the point if its
  #     deviation from the neighbourhood centroid exceeds threshold_ratio
  #     of the total absolute spread (dimensionless ratio, 0–1).
  neighborhood_filter:
    enabled: false
    window_points: 10       # max neighbours each side
    window_seconds: 600     # max time gap (s) to include a neighbour
    threshold_ratio: 0.6    # deviation / spread ratio above which to drop

  # 2.4 Split trajectory into sub-segments when the time gap between two
  #     consecutive points exceeds threshold_s seconds
  cut_gap:
    enabled: false
    threshold_s: 1800

  # 2.5 Split trajectory when the user stays within spatial_threshold_m
  #     for at least time_threshold_s seconds (stationary stay detection)
  cut_stay:
    enabled: false
    time_threshold_s: 1800
    spatial_threshold_m: 50

  # 2.6 Data replication: process each trajectory replicas times, each run
  #     getting independently drawn random values (rotation, displacement,
  #     time_shift).  When replicas > 1, IDs are suffixed _r0, _r1, ...
  #     If a step's seed is set, replica i uses seed+i for reproducibility.
  replicas: 3

  # 2.7 Timestamp shifting: each trajectory segment is shifted so that its
  #     midpoint (mean of first and last timestamp) falls at a uniformly
  #     random position within [range_start, range_end].  All inter-point
  #     intervals are preserved.  Set seed for reproducibility.
  time_shift:
    enabled: false
    range_start: "2020-01-01 00:00:00"
    range_end:   "2020-01-07 23:59:59"
    seed: null                          # null = random each run

  # 2.8 Spatial rotation: rotate each trajectory (or segment) around its
  #     own bounding-box centre by a randomly drawn angle.
  #       distribution: normal   → angle ~ N(0, std_deg)
  #                     uniform  → angle ~ U(−range_deg, +range_deg)
  #       per_segment: true  = each (id, seg_id) is rotated independently
  #                    false = rotate each full trajectory (id) as one unit
  spatial_rotation:
    enabled: false
    distribution: uniform        # normal | uniform
    std_deg: 30                 # normal: standard deviation (degrees)
    range_deg: 180              # uniform: half-range (degrees)
    per_segment: true
    seed: null                  # null = random each run

  # 2.9 Spatial displacement: shift each trajectory (or segment) so that its
  #     bounding-box centre moves by a random (dlat, dlon), both in degrees.
  #       distribution: normal   → offset ~ N(0, std_deg)
  #                     uniform  → offset ~ U(−range_deg, +range_deg)
  #       per_segment: true  = each (id, seg_id) is displaced independently
  #                    false = displace each full trajectory (id) as one unit
  spatial_displacement:
    enabled: false
    distribution: normal        # normal | uniform
    std_deg: 0.5                # normal: standard deviation (degrees)
    range_deg: 1.0              # uniform: half-range (degrees)
    per_segment: true
    seed: null                  # null = random each run

# ── 3. Output ────────────────────────────────────────────────────────────────
output:
  directory: output
  merge: true               # true → one file for all users/taxis (default)
  geolife_prefix: geolife
  tdrive_prefix: tdrive

  # 3.1 Format:
  #   wkt      → one LINESTRING WKT per trajectory segment
  #   postgis  → PostGIS INSERT INTO ... VALUES ('...'::geometry); statements
  #   geojson  → GeoJSON FeatureCollection of LineString features
  format: postgis

  # 3.2 Time dimension (wkt and postgis only) — choose where to store time:
  #   z  → LINESTRING Z(x y time, ...)     time stored as the Z coordinate
  #   m  → LINESTRINGM(x y time, ...)      time stored as the M (measure) value
  # For geojson the timestamp list is always written to Feature properties.
  time_dimension: m

  # Unit for the stored time value:
  #   seconds  → Unix epoch in seconds  (e.g. 1201234567)
  #   hours    → Unix epoch / 3600      (1 unit = 1 hour, smaller numbers)
  time_unit: seconds

  # Target table name for postgis format
  postgis_table: traj_table
